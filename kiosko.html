<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Terminal de Asistencia — First Patagonia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --orange: #E8521A;
      --teal: #00B8A9;
      --green: #16a34a;
      --red: #dc2626;
      --cream: #F5F2EC;
      --serif: 'Cormorant Garamond', serif;
      --sans: 'Jost', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: var(--sans);
      background: #0A0A0A;
      color: var(--cream);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ── FONDO ── */
    .bg-glow {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background: radial-gradient(ellipse at 50% 110%, rgba(232,82,26,.12) 0%, transparent 60%);
    }

    /* ── RELOJ GLOBAL (siempre visible) ── */
    .global-clock {
      position: fixed;
      top: 2rem; left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 10;
    }

    .global-time {
      font-family: var(--serif);
      font-size: clamp(3.5rem, 8vw, 5.5rem);
      font-weight: 300;
      color: var(--cream);
      letter-spacing: .04em;
      line-height: 1;
    }

    .global-date {
      font-size: clamp(.75rem, 1.5vw, .9rem);
      letter-spacing: .18em;
      text-transform: uppercase;
      color: rgba(255,255,255,.35);
      margin-top: .4rem;
    }

    /* ── LOGO ── */
    .logo-area {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .logo-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--orange);
      margin-bottom: .6rem;
    }

    .logo-name {
      font-family: var(--serif);
      font-size: clamp(1.6rem, 3.5vw, 2.2rem);
      font-weight: 400;
      color: var(--cream);
      letter-spacing: .04em;
    }

    .logo-sub {
      font-size: clamp(.65rem, 1.2vw, .75rem);
      letter-spacing: .2em;
      text-transform: uppercase;
      color: rgba(255,255,255,.3);
      margin-top: .3rem;
    }

    /* ── ESTADO CONTAINER ── */
    .state { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 460px; z-index: 1; }
    .state.active { display: flex; animation: fadeIn .3s ease; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* ── INPUTS ── */
    .field { width: 100%; margin-bottom: 1rem; }

    .field label {
      display: block;
      font-size: .72rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: rgba(255,255,255,.4);
      margin-bottom: .5rem;
    }

    .field input {
      width: 100%;
      padding: 1.1rem 1.3rem;
      background: rgba(255,255,255,.06);
      border: 1.5px solid rgba(255,255,255,.1);
      border-radius: 10px;
      color: var(--cream);
      font-family: var(--sans);
      font-size: clamp(1rem, 2vw, 1.1rem);
      outline: none;
      transition: border-color .2s, background .2s;
      -webkit-appearance: none;
    }

    .field input:focus {
      border-color: var(--orange);
      background: rgba(255,255,255,.09);
    }

    .field input::placeholder { color: rgba(255,255,255,.2); }

    /* ── BOTONES ── */
    .btn-main {
      width: 100%;
      padding: 1.3rem;
      border-radius: 12px;
      font-family: var(--sans);
      font-size: clamp(1rem, 2.2vw, 1.15rem);
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      transition: all .2s;
      margin-top: .5rem;
    }

    .btn-main:active { transform: scale(.98); }
    .btn-main:disabled { opacity: .5; cursor: not-allowed; }

    .btn-entrada { background: var(--orange); color: white; }
    .btn-entrada:hover:not(:disabled) { background: #d4481a; }

    .btn-salida { background: var(--red); color: white; }
    .btn-salida:hover:not(:disabled) { background: #b91c1c; }

    .btn-acceder { background: var(--orange); color: white; }
    .btn-acceder:hover:not(:disabled) { background: #d4481a; }

    .btn-cancel {
      background: transparent;
      color: rgba(255,255,255,.35);
      border: 1.5px solid rgba(255,255,255,.1);
      margin-top: .75rem;
      font-size: .88rem;
      letter-spacing: .06em;
    }

    .btn-cancel:hover { border-color: rgba(255,255,255,.25); color: rgba(255,255,255,.6); }

    /* ── ERROR ── */
    .error-msg {
      background: rgba(220,38,38,.12);
      border: 1px solid rgba(220,38,38,.3);
      color: #fca5a5;
      padding: .8rem 1.1rem;
      border-radius: 8px;
      font-size: .85rem;
      text-align: center;
      width: 100%;
      margin-bottom: 1rem;
      display: none;
    }

    .error-msg.show { display: block; animation: fadeIn .2s; }

    /* ── LOADING SPINNER ── */
    .spinner {
      width: 50px; height: 50px;
      border: 3px solid rgba(255,255,255,.1);
      border-top-color: var(--orange);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin-bottom: 1.5rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── ACTION STATE ── */
    .greeting-name {
      font-family: var(--serif);
      font-size: clamp(2.5rem, 6vw, 3.8rem);
      font-weight: 400;
      color: var(--cream);
      text-align: center;
      line-height: 1.1;
      margin-bottom: .5rem;
    }

    .clock-status-line {
      font-size: clamp(.8rem, 1.6vw, .92rem);
      letter-spacing: .12em;
      text-transform: uppercase;
      color: rgba(255,255,255,.4);
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .clock-status-line .entrada-time {
      color: var(--teal);
    }

    /* ── SUCCESS STATE ── */
    .success-icon {
      width: 90px; height: 90px;
      border-radius: 50%;
      background: rgba(22,163,74,.15);
      border: 2px solid var(--green);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem;
      color: var(--green);
      margin-bottom: 1.5rem;
      animation: popIn .4s cubic-bezier(.34,1.56,.64,1);
    }

    @keyframes popIn { from { transform: scale(.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    .success-action {
      font-size: clamp(.7rem, 1.3vw, .78rem);
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: .5rem;
    }

    .success-time {
      font-family: var(--serif);
      font-size: clamp(3rem, 7vw, 5rem);
      font-weight: 300;
      color: var(--cream);
      letter-spacing: .04em;
      line-height: 1;
      margin-bottom: .4rem;
    }

    .success-name {
      font-size: clamp(.9rem, 1.8vw, 1.05rem);
      color: rgba(255,255,255,.5);
      margin-bottom: 2rem;
    }

    .countdown-bar-wrap {
      width: 200px;
      height: 3px;
      background: rgba(255,255,255,.1);
      border-radius: 99px;
      overflow: hidden;
    }

    .countdown-bar {
      height: 100%;
      background: var(--green);
      border-radius: 99px;
      width: 100%;
      transition: width linear;
    }

    .countdown-txt {
      font-size: .75rem;
      color: rgba(255,255,255,.3);
      letter-spacing: .1em;
      margin-top: .75rem;
    }

    /* ── ALREADY DONE ── */
    .done-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: .6;
    }

    .done-title {
      font-family: var(--serif);
      font-size: clamp(1.6rem, 3.5vw, 2.2rem);
      font-weight: 400;
      color: rgba(255,255,255,.7);
      text-align: center;
      margin-bottom: .5rem;
    }

    .done-sub {
      font-size: .84rem;
      color: rgba(255,255,255,.35);
      text-align: center;
      letter-spacing: .04em;
    }

    .done-times {
      display: flex; gap: 2rem; margin: 1.5rem 0;
    }

    .done-time-item { text-align: center; }
    .done-time-label { font-size: .65rem; letter-spacing: .14em; text-transform: uppercase; color: rgba(255,255,255,.3); margin-bottom: .3rem; }
    .done-time-val { font-family: var(--serif); font-size: 1.8rem; font-weight: 300; color: var(--teal); }

    /* ── DIVISOR ── */
    .divider {
      width: 40px; height: 1px;
      background: rgba(255,255,255,.1);
      margin: 1.5rem auto;
    }

    /* ── PIN PAD ── */
    .pin-dot {
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,.25);
      background: transparent;
      transition: background .15s, border-color .15s;
    }
    .pin-dot.filled {
      background: var(--orange);
      border-color: var(--orange);
      transform: scale(1.1);
    }
    .pin-btn {
      width: 100%; aspect-ratio: 1;
      border-radius: 50%;
      background: rgba(255,255,255,.08);
      border: 1.5px solid rgba(255,255,255,.12);
      color: var(--cream);
      font-family: var(--sans);
      font-size: clamp(1.4rem, 4vw, 1.8rem);
      font-weight: 300;
      letter-spacing: .04em;
      cursor: pointer;
      transition: background .12s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .pin-btn:active {
      background: rgba(232,82,26,.35);
      transform: scale(.94);
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>

  <!-- Reloj global -->
  <div class="global-clock">
    <div class="global-time" id="globalTime">--:--</div>
    <div class="global-date" id="globalDate"></div>
  </div>

  <!-- ─── PIN PAD (pantalla principal) ─── -->
  <div class="state active" id="state-pin" style="margin-top:4rem;align-items:center">
    <div class="logo-area" style="margin-bottom:1.5rem">
      <div class="logo-dot"></div>
      <div class="logo-name">First Patagonia</div>
      <div class="logo-sub">Ingresa tu PIN</div>
    </div>

    <div id="pinError" class="error-msg" style="max-width:300px">PIN incorrecto. Intenta de nuevo.</div>

    <!-- Indicador de dígitos -->
    <div style="display:flex;gap:1rem;justify-content:center;margin-bottom:2rem">
      <div class="pin-dot" id="pd0"></div>
      <div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div>
      <div class="pin-dot" id="pd3"></div>
    </div>

    <!-- Teclado numérico -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;max-width:300px;width:100%">
      <button class="pin-btn" onclick="pinKey('1')">1</button>
      <button class="pin-btn" onclick="pinKey('2')">2</button>
      <button class="pin-btn" onclick="pinKey('3')">3</button>
      <button class="pin-btn" onclick="pinKey('4')">4</button>
      <button class="pin-btn" onclick="pinKey('5')">5</button>
      <button class="pin-btn" onclick="pinKey('6')">6</button>
      <button class="pin-btn" onclick="pinKey('7')">7</button>
      <button class="pin-btn" onclick="pinKey('8')">8</button>
      <button class="pin-btn" onclick="pinKey('9')">9</button>
      <button class="pin-btn" onclick="pinClear()" style="font-size:1rem;letter-spacing:0">C</button>
      <button class="pin-btn" onclick="pinKey('0')">0</button>
      <button class="pin-btn" onclick="pinDelete()" style="font-size:1.2rem;letter-spacing:0">⌫</button>
    </div>

    <button onclick="showState('state-login')" style="background:none;border:none;color:rgba(255,255,255,.2);font-size:.72rem;cursor:pointer;letter-spacing:.08em;margin-top:2rem;text-decoration:underline">
      Usar correo y contraseña
    </button>
  </div>

  <!-- ─── LOGIN (fallback email/password) ─── -->
  <div class="state" id="state-login" style="margin-top:6rem">
    <div class="logo-area">
      <div class="logo-dot"></div>
      <div class="logo-name">First Patagonia</div>
      <div class="logo-sub">Terminal de asistencia</div>
    </div>

    <div id="loginError" class="error-msg">Correo o contraseña incorrectos. Intenta de nuevo.</div>

    <div class="field">
      <label>Correo electrónico</label>
      <input type="email" id="inputEmail" inputmode="email" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="tu@correo.cl">
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="inputPassword" autocomplete="off" placeholder="••••••••">
    </div>

    <button class="btn-main btn-acceder" id="loginBtn" onclick="doLogin()">Acceder</button>
    <button onclick="showState('state-pin')" style="background:none;border:none;color:rgba(255,255,255,.25);font-size:.72rem;cursor:pointer;letter-spacing:.08em;margin-top:1rem;text-decoration:underline">
      ← Volver al PIN
    </button>
  </div>

  <!-- ─── LOADING ─── -->
  <div class="state" id="state-loading">
    <div class="spinner"></div>
    <div style="color:rgba(255,255,255,.4);font-size:.88rem;letter-spacing:.1em">Verificando...</div>
  </div>

  <!-- ─── ACTION ─── -->
  <div class="state" id="state-action">
    <div class="greeting-name" id="actionName"></div>
    <div class="clock-status-line" id="actionStatus"></div>
    <button class="btn-main" id="actionBtn" onclick="doClock()"></button>
    <button class="btn-main btn-cancel" onclick="cancelAction()">Cancelar</button>
    <!-- Aviso de inactividad -->
    <div id="idleWarning" style="display:none;position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:.65rem 1.5rem;font-size:.82rem;color:rgba(255,255,255,.5);letter-spacing:.04em;text-align:center">
      Volviendo al inicio en <strong id="idleCount" style="color:rgba(255,255,255,.8)">10</strong>s...
    </div>
  </div>

  <!-- ─── SUCCESS ─── -->
  <div class="state" id="state-success">
    <div class="success-icon">✓</div>
    <div class="success-action" id="successLabel"></div>
    <div class="success-time" id="successTime"></div>
    <div class="success-name" id="successName"></div>
    <div class="countdown-bar-wrap">
      <div class="countdown-bar" id="countdownBar"></div>
    </div>
    <div class="countdown-txt" id="countdownTxt"></div>
  </div>

  <!-- ─── MOTIVO DE DIFERENCIA ─── -->
  <div class="state" id="state-reason">
    <div class="greeting-name" id="reasonName"></div>
    <div id="reasonAlert" style="font-size:clamp(.82rem,1.5vw,.95rem);text-align:center;margin-bottom:1.5rem;line-height:1.7;max-width:360px;padding:1rem 1.5rem;border-radius:10px;background:rgba(255,255,255,.07)"></div>
    <div style="width:100%;max-width:360px">
      <label style="display:block;font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:.5rem">
        Escribe el motivo
      </label>
      <textarea id="reasonText" placeholder="Ej: Terminé antes porque la limpieza estuvo lista temprano..."
        style="width:100%;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.15);border-radius:10px;color:var(--cream);font-family:var(--sans);font-size:.95rem;padding:1rem;resize:none;height:100px;outline:none"
        oninput="document.getElementById('confirmReasonBtn').disabled = this.value.trim().length < 5"></textarea>
    </div>
    <button class="btn-main btn-salida" id="confirmReasonBtn" onclick="confirmReason()" disabled style="margin-top:1rem">
      Confirmar salida
    </button>
    <button class="btn-main btn-cancel" onclick="cancelAction()" style="margin-top:.5rem">Cancelar</button>
  </div>

  <!-- ─── JORNADA COMPLETA ─── -->
  <div class="state" id="state-done">
    <div class="done-icon">🌙</div>
    <div class="done-title" id="doneTitle">Jornada completada</div>
    <div class="done-sub" id="doneName"></div>
    <div class="done-times">
      <div class="done-time-item">
        <div class="done-time-label">Entrada</div>
        <div class="done-time-val" id="doneIn">—</div>
      </div>
      <div class="done-time-item">
        <div class="done-time-label">Salida</div>
        <div class="done-time-val" id="doneOut">—</div>
      </div>
    </div>
    <div class="countdown-bar-wrap">
      <div class="countdown-bar" id="countdownBar2"></div>
    </div>
    <div class="countdown-txt" id="countdownTxt2"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/client.js"></script>
  <script>
    let currentProfile   = null
    let clockRecord      = null
    let currentSchedule  = null
    let countdownTimer   = null
    let pendingClockOut  = null
    let pendingLateArrival = null   // { recordId, lateMin }
    let idleTimer        = null
    let idleInterval     = null
    const IDLE_TIMEOUT  = 30   // segundos hasta auto-logout
    const IDLE_WARNING  = 20   // segundos hasta mostrar aviso

    // ── Auto-logout por inactividad ────────────────────────────
    function startIdleTimer() {
      stopIdleTimer()
      let remaining = IDLE_TIMEOUT
      const warning = document.getElementById('idleWarning')
      const count   = document.getElementById('idleCount')

      idleInterval = setInterval(() => {
        remaining--
        const sinceWarning = IDLE_TIMEOUT - remaining
        if (remaining <= IDLE_TIMEOUT - IDLE_WARNING) {
          warning.style.display = 'block'
          count.textContent = remaining
        }
        if (remaining <= 0) {
          stopIdleTimer()
          cancelAction()
        }
      }, 1000)
    }

    function stopIdleTimer() {
      clearInterval(idleInterval)
      idleInterval = null
      const warning = document.getElementById('idleWarning')
      if (warning) warning.style.display = 'none'
    }

    function resetIdleTimer() {
      const activeState = document.querySelector('.state.active')?.id
      if (activeState === 'state-action' || activeState === 'state-reason') {
        startIdleTimer()
      }
    }

    // Teclado físico también activa el PIN pad
    document.addEventListener('keydown', e => {
      const active = document.querySelector('.state.active')?.id
      if (active === 'state-pin' && e.key >= '0' && e.key <= '9') pinKey(e.key)
      if (active === 'state-pin' && e.key === 'Backspace') pinDelete()
    })

    // Cualquier toque o clic reinicia el timer
    document.addEventListener('touchstart', resetIdleTimer, { passive: true })
    document.addEventListener('mousedown', resetIdleTimer)

    // ── Reglas de horas ───────────────────────────────────────
    const OVER_THRESHOLD_MIN  = 30   // min extra para que cuenten (posible HH.EE.)
    const UNDER_THRESHOLD_MIN = 15   // tolerancia para llegada tarde (revisión admin)
    const EARLY_BLOCK_MIN     = 20   // bloquear entrada si llega >20 min antes del turno
    const MAX_EARLY_EXIT_MIN  = 60   // bloquear salida si quiere irse >60 min antes del fin

    // ── WhatsApp al admin (Green API directo desde el browser) ────
    const WA_INSTANCE = '7107643408'
    const WA_TOKEN    = '9d24cc1e42b149e7acaa68213fed35e2448a653de92647c397'
    const WA_ADMIN    = '56966165309@c.us'

    function notifyAdminWA(msg) {
      try {
        fetch(
          `https://api.green-api.com/waInstance${WA_INSTANCE}/sendMessage/${WA_TOKEN}`,
          {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ chatId: WA_ADMIN, message: msg })
          }
        ).catch(() => {})
      } catch (_) {}
    }

    // ── Reloj en vivo ──────────────────────────────────────────
    function tick() {
      const now = new Date()
      document.getElementById('globalTime').textContent =
        now.toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit' })
      document.getElementById('globalDate').textContent =
        now.toLocaleDateString('es-CL', { weekday: 'long', day: 'numeric', month: 'long' }).toUpperCase()
    }
    setInterval(tick, 1000)
    tick()

    // ── Navegación entre estados ───────────────────────────────
    function showState(id) {
      document.querySelectorAll('.state').forEach(s => s.classList.remove('active'))
      document.getElementById(id).classList.add('active')
      // Activar idle timer solo en pantallas donde el empleado debe actuar
      if (id === 'state-action' || id === 'state-reason') {
        startIdleTimer()
      } else {
        stopIdleTimer()
      }
    }

    // ── PIN pad ─────────────────────────────────────────────────
    let pinValue = ''

    function pinKey(d) {
      if (pinValue.length >= 4) return
      document.getElementById('pinError')?.classList.remove('show')
      pinValue += d
      updatePinDots()
      if (pinValue.length === 4) setTimeout(pinSubmit, 120)
    }

    function pinDelete() {
      pinValue = pinValue.slice(0, -1)
      updatePinDots()
    }

    function pinClear() {
      pinValue = ''
      updatePinDots()
    }

    function updatePinDots() {
      for (let i = 0; i < 4; i++) {
        document.getElementById('pd' + i)?.classList.toggle('filled', i < pinValue.length)
      }
    }

    async function pinSubmit() {
      if (pinValue.length !== 4) return
      showState('state-loading')

      const { data: prof } = await sb.from('profiles')
        .select('*').eq('kiosk_pin', pinValue)
        .eq('is_active', true).maybeSingle()

      if (!prof) {
        const { data: prof2 } = await sb.from('profiles')
          .select('*').eq('kiosk_pin', pinValue)
          .is('is_active', null).maybeSingle()
        if (!prof2) {
          pinValue = ''
          updatePinDots()
          document.getElementById('pinError').classList.add('show')
          showState('state-pin')
          return
        }
        currentProfile = prof2
      } else {
        currentProfile = prof
      }

      const todayStr = new Date().toISOString().split('T')[0]
      const [{ data: clock }, { data: sched }] = await Promise.all([
        sb.from('clock_records').select('*').eq('employee_id', currentProfile.id).eq('date', todayStr).maybeSingle(),
        sb.from('schedules').select('*').eq('employee_id', currentProfile.id).eq('date', todayStr).maybeSingle()
      ])

      clockRecord     = clock
      currentSchedule = sched
      pinValue = ''

      if (clock?.clock_in && clock?.clock_out) showDone()
      else showAction()
    }

    // ── Login (email/password fallback) ───────────────────────
    document.getElementById('inputPassword').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin()
    })

    async function doLogin() {
      const email    = document.getElementById('inputEmail').value.trim()
      const password = document.getElementById('inputPassword').value
      const err      = document.getElementById('loginError')
      const btn      = document.getElementById('loginBtn')

      if (!email || !password) {
        err.textContent = 'Ingresa tu correo y contraseña.'
        err.classList.add('show')
        return
      }

      err.classList.remove('show')
      btn.disabled = true
      showState('state-loading')

      // Autenticar
      const { data: authData, error: authError } = await sb.auth.signInWithPassword({ email, password })

      if (authError) {
        try { await sb.auth.signOut() } catch (_) {}
        err.textContent = 'Correo o contraseña incorrectos. Intenta de nuevo.'
        err.classList.add('show')
        document.getElementById('inputPassword').value = ''
        btn.disabled = false
        showState('state-login')
        return
      }

      // Obtener perfil
      const { data: profile } = await sb.from('profiles')
        .select('*').eq('id', authData.user.id).single()

      if (!profile) {
        try { await sb.auth.signOut() } catch (_) {}
        err.textContent = 'Tu perfil no está configurado. Habla con el administrador.'
        err.classList.add('show')
        btn.disabled = false
        showState('state-login')
        return
      }

      // Obtener fichaje y turno asignado de hoy
      const todayStr = new Date().toISOString().split('T')[0]
      const [{ data: clock }, { data: sched }] = await Promise.all([
        sb.from('clock_records').select('*').eq('employee_id', profile.id).eq('date', todayStr).maybeSingle(),
        sb.from('schedules').select('*').eq('employee_id', profile.id).eq('date', todayStr).maybeSingle()
      ])

      currentProfile  = profile
      clockRecord     = clock
      currentSchedule = sched
      btn.disabled    = false

      // Decidir qué mostrar
      if (clock?.clock_in && clock?.clock_out) {
        showDone()
      } else {
        showAction()
      }
    }

    // ── Pantalla de acción ─────────────────────────────────────
    function showAction() {
      const firstName = currentProfile.full_name.split(' ')[0]
      document.getElementById('actionName').textContent = firstName

      const btn = document.getElementById('actionBtn')

      // Si hoy es día libre asignado → no permitir fichaje
      if (currentSchedule?.day_type === 'libre') {
        document.getElementById('actionStatus').innerHTML = '🟢 Día libre asignado hoy'
        btn.textContent = 'No hay fichaje en días libres'
        btn.className   = 'btn-main btn-cancel'
        btn.disabled    = true
        showState('state-action')
        return
      }

      if (!clockRecord || !clockRecord.clock_in) {
        // ── Verificar ventana de entrada ────────────────────────
        if (currentSchedule?.shift_start && currentSchedule.day_type === 'turno') {
          const todayDate  = new Date().toISOString().split('T')[0]
          const schedStart = new Date(`${todayDate}T${currentSchedule.shift_start.slice(0,5)}:00`)
          const minEarly   = Math.round((schedStart - new Date()) / 60000)

          if (minEarly > EARLY_BLOCK_MIN) {
            // Demasiado temprano — bloquear
            const canFrom = new Date(schedStart.getTime() - EARLY_BLOCK_MIN * 60000)
            const canTime = canFrom.toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit' })
            document.getElementById('actionStatus').innerHTML =
              `Tu turno empieza a las <span class="entrada-time">${currentSchedule.shift_start.slice(0,5)}</span>`
            btn.textContent = `Puedes ingresar desde las ${canTime}`
            btn.className   = 'btn-main btn-cancel'
            btn.disabled    = true
            showState('state-action')
            return
          }
        }

        const shiftInfo = (currentSchedule?.day_type === 'turno' && currentSchedule?.shift_start)
          ? `Turno: <span class="entrada-time">${currentSchedule.shift_start.slice(0,5)} – ${currentSchedule.shift_end.slice(0,5)}</span>`
          : 'Sin turno asignado hoy'
        document.getElementById('actionStatus').innerHTML = shiftInfo
        btn.textContent  = 'Registrar Entrada'
        btn.className    = 'btn-main btn-entrada'
      } else {
        const inTime   = new Date(clockRecord.clock_in).toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit' })
        const horasTranscurridas = (new Date() - new Date(clockRecord.clock_in)) / 3600000

        // Bloquear salida si han pasado más de 10 horas (olvidó salir)
        if (horasTranscurridas > 10) {
          document.getElementById('actionStatus').innerHTML =
            `Entrada: <span class="entrada-time">${inTime}</span>`
          btn.textContent  = 'Contacta al administrador'
          btn.className    = 'btn-main btn-cancel'
          btn.disabled     = true
          // Limpiar avisos previos antes de insertar (evita duplicados si se entra varias veces)
          document.querySelectorAll('#state-action .over10-warn').forEach(el => el.remove())
          document.getElementById('actionName').insertAdjacentHTML('afterend', `
            <div class="over10-warn" style="font-size:clamp(.75rem,1.4vw,.88rem);color:rgba(255,120,120,.9);text-align:center;margin-bottom:1.5rem;line-height:1.6;max-width:340px">
              Han pasado más de 10 horas desde tu entrada.<br>
              El administrador debe registrar tu salida manualmente.
            </div>
          `)
        } else {
          // Verificar si intenta salir demasiado temprano (>60 min antes del fin del turno)
          let exitBlocked = false
          if (currentSchedule?.shift_end) {
            const todayDate = new Date().toISOString().split('T')[0]
            const schedEnd  = new Date(`${todayDate}T${currentSchedule.shift_end.slice(0,5)}:00`)
            const minUntilEnd = Math.round((schedEnd - new Date()) / 60000)

            if (minUntilEnd > MAX_EARLY_EXIT_MIN) {
              exitBlocked = true
              const canFrom = new Date(schedEnd.getTime() - MAX_EARLY_EXIT_MIN * 60000)
              const canTime = canFrom.toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit' })
              document.getElementById('actionStatus').innerHTML =
                `Entrada: <span class="entrada-time">${inTime}</span>`
              btn.textContent = `Podrás salir desde las ${canTime}`
              btn.className   = 'btn-main btn-cancel'
              btn.disabled    = true
            }
          }

          if (!exitBlocked) {
            document.getElementById('actionStatus').innerHTML =
              `Entrada: <span class="entrada-time">${inTime}</span>`
            btn.textContent = 'Registrar Salida'
            btn.className   = 'btn-main btn-salida'
          }
        }
      }

      showState('state-action')
    }

    // ── Fichar ─────────────────────────────────────────────────
    async function doClock() {
      const btn = document.getElementById('actionBtn')
      btn.disabled = true
      showState('state-loading')

      const now      = new Date()
      const todayStr = now.toISOString().split('T')[0]

      if (!clockRecord || !clockRecord.clock_in) {
        // ── ENTRADA — calcular hora efectiva y detectar tarde ───
        let effectiveClockIn = now.toISOString()
        let lateArrivalMin   = 0
        let isLate           = false

        if (currentSchedule?.shift_start && currentSchedule.day_type === 'turno') {
          const schedStart = new Date(`${todayStr}T${currentSchedule.shift_start.slice(0,5)}:00`)
          const minEarly   = Math.round((schedStart - now) / 60000)  // positivo = temprano

          if (minEarly > 0) {
            // Llegó antes del turno (dentro de la ventana permitida):
            // las horas cuentan desde el inicio oficial del turno
            effectiveClockIn = schedStart.toISOString()
          } else if (minEarly < 0) {
            // Llegó tarde
            lateArrivalMin = Math.abs(minEarly)
            isLate = lateArrivalMin > UNDER_THRESHOLD_MIN  // >15 min → revisión + motivo
          }
        }

        const { data, error } = await sb.from('clock_records').upsert({
          employee_id:  currentProfile.id,
          date:         todayStr,
          clock_in:     effectiveClockIn,
          clock_out:    null,
          needs_review: isLate
        }, { onConflict: 'employee_id,date' }).select().single()

        if (error) { btn.disabled = false; showAction(); return }
        clockRecord = data

        // WhatsApp al admin si llegó tarde (cualquier cantidad)
        if (lateArrivalMin > 0) {
          const shift = currentSchedule?.shift_start
            ? `${currentSchedule.shift_start.slice(0,5)}–${currentSchedule.shift_end.slice(0,5)}`
            : 'turno sin horario'
          notifyAdminWA(
            `⚠️ First Patagonia HR\n` +
            `${currentProfile.full_name} llegó ${minsToStr(lateArrivalMin)} tarde a su turno (${shift}).\n` +
            `Ingresó a las ${now.toLocaleTimeString('es-CL', { hour:'2-digit', minute:'2-digit' })}.`
          )
        }

        if (isLate) {
          pendingLateArrival = { recordId: data.id, lateMin: lateArrivalMin }
          showLateArrivalPrompt(lateArrivalMin)
          btn.disabled = false
          return
        }

        // Llegada normal → notificar + éxito directo
        const displayTime = new Date(effectiveClockIn).toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit' })
        const shiftStr = currentSchedule?.shift_start
          ? `${currentSchedule.shift_start.slice(0,5)}–${currentSchedule.shift_end.slice(0,5)}`
          : 'sin turno asignado'
        notifyAdminWA(`✅ First Patagonia HR\n${currentProfile.full_name} ingresó a las ${displayTime}\nTurno: ${shiftStr}`)
        try { await sb.auth.signOut() } catch (_) {}
        document.getElementById('successLabel').textContent = 'ENTRADA REGISTRADA'
        document.getElementById('successTime').textContent  = displayTime
        document.getElementById('successName').textContent  = currentProfile.full_name
        showState('state-success')
        startCountdown('countdownBar', 'countdownTxt', 5, reset)

      } else {
        // ── SALIDA — comparar contra ventana del turno (inicio Y fin) ──
        let needsReason  = false
        let needsReview  = false
        let deviationData = null

        if (currentSchedule?.shift_start && currentSchedule?.shift_end) {
          const clockInDate = clockRecord.clock_in.split('T')[0]

          // Construir horario programado como objetos Date
          const schedStart = new Date(`${clockInDate}T${currentSchedule.shift_start.slice(0,5)}:00`)
          const schedEnd   = new Date(`${clockInDate}T${currentSchedule.shift_end.slice(0,5)}:00`)
          if (schedEnd <= schedStart) schedEnd.setDate(schedEnd.getDate() + 1) // turno cruza medianoche

          const lateArrivalMin    = Math.round((new Date(clockRecord.clock_in) - schedStart) / 60000)
          const earlyDepartureMin = Math.round((schedEnd - now) / 60000)
          const overtimeMin       = Math.round((now - schedEnd) / 60000)
          const workedMin         = Math.round((now - new Date(clockRecord.clock_in)) / 60000)
          const scheduledMin      = Math.round((schedEnd - schedStart) / 60000)

          let mainType = null

          if (earlyDepartureMin > MAX_EARLY_EXIT_MIN) {
            // Intenta salir más de 60 min antes — bloqueado (showAction ya lo previene,
            // este bloqueo es la segunda capa de seguridad)
            const schedEnd  = new Date(`${clockInDate}T${currentSchedule.shift_end.slice(0,5)}:00`)
            const canFrom   = new Date(schedEnd.getTime() - MAX_EARLY_EXIT_MIN * 60000)
            const canTime   = canFrom.toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit' })
            document.getElementById('actionStatus').innerHTML =
              `Entrada: <span class="entrada-time">${new Date(clockRecord.clock_in).toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'})}</span>`
            document.getElementById('actionBtn').textContent = `Podrás salir desde las ${canTime}`
            document.getElementById('actionBtn').className   = 'btn-main btn-cancel'
            document.getElementById('actionBtn').disabled    = true
            showState('state-action')
            btn.disabled = false
            return
          } else if (lateArrivalMin > UNDER_THRESHOLD_MIN) {
            // Llegó más de 15 min tarde
            mainType    = 'late_arrival'
            needsReason = true
            needsReview = true
          } else if (overtimeMin >= OVER_THRESHOLD_MIN) {
            // Se quedó 30+ min extra
            mainType    = 'overtime'
            needsReason = true
            needsReview = true
          } else if (earlyDepartureMin > 0) {
            // Salió antes del fin del turno (cualquier minuto) → requiere explicación
            mainType    = 'early_exit'
            needsReason = true
            needsReview = true
          }
          // Salida normal (entre el fin del turno y +29 min) → sin motivo

          if (mainType) {
            deviationData = { mainType, lateArrivalMin, earlyDepartureMin, overtimeMin, workedMin, scheduledMin }
          }
        }

        if (needsReason && deviationData) {
          pendingClockOut = { now, needsReview, deviationData }
          showReasonPrompt(deviationData)
          btn.disabled = false
        } else {
          await saveClockOut(now, '', false)
        }
      }
    }

    // Convierte minutos a string legible: 279 → "4h 39min"
    function minsToStr(m) {
      m = Math.abs(Math.round(m))
      const h = Math.floor(m / 60)
      const min = m % 60
      if (h > 0 && min > 0) return `${h}h ${min}min`
      if (h > 0)             return `${h}h`
      return `${min}min`
    }

    function showReasonPrompt(data) {
      const { mainType, lateArrivalMin, earlyDepartureMin, overtimeMin, workedMin, scheduledMin } = data

      document.getElementById('reasonName').textContent = currentProfile.full_name.split(' ')[0]

      const al = document.getElementById('reasonAlert')
      let msg = ''
      let borderColor = 'rgba(217,119,6,.6)'

      if (mainType === 'late_arrival') {
        borderColor = 'rgba(220,38,38,.55)'
        msg = `⚠ Llegaste <strong>${minsToStr(lateArrivalMin)} tarde</strong> a tu turno.<br>`
        if (overtimeMin > 0)        msg += `Saliste <strong>${minsToStr(overtimeMin)} después</strong> del fin de turno.<br>`
        else if (earlyDepartureMin > 0) msg += `Saliste <strong>${minsToStr(earlyDepartureMin)} antes</strong> del fin de turno.<br>`
        msg += `<span style="color:rgba(255,160,160,.9)">Trabajaste ${minsToStr(workedMin)} de ${minsToStr(scheduledMin)} programadas.</span>`

      } else if (mainType === 'overtime') {
        borderColor = 'rgba(0,184,169,.5)'
        msg = `✓ Turno de <strong>${minsToStr(scheduledMin)}</strong> · trabajaste <strong>${minsToStr(workedMin)}</strong>.<br>`
        msg += `<span style="color:rgba(100,220,210,.9)">Te quedaste ${minsToStr(overtimeMin)} extra después de tu turno.</span>`

      } else {
        // early_exit
        borderColor = 'rgba(217,119,6,.6)'
        msg = `⚠ Saliste <strong>${minsToStr(earlyDepartureMin)} antes</strong> del fin de tu turno.<br>`
        msg += `<span style="color:rgba(255,180,50,.9)">Trabajaste ${minsToStr(workedMin)} de ${minsToStr(scheduledMin)} programadas.</span>`
      }

      al.style.borderLeft = `3px solid ${borderColor}`
      al.innerHTML = msg

      // Restaurar botón al modo "salida" (puede haberse cambiado por late arrival)
      const btn = document.getElementById('confirmReasonBtn')
      btn.textContent = 'Confirmar salida'
      btn.className   = 'btn-main btn-salida'
      btn.disabled    = true

      document.getElementById('reasonText').value = ''
      showState('state-reason')
    }

    // ── Llegada tardía ─────────────────────────────────────────
    function showLateArrivalPrompt(lateMin) {
      document.getElementById('reasonName').textContent = currentProfile.full_name.split(' ')[0]

      const al = document.getElementById('reasonAlert')
      al.style.borderLeft = '3px solid rgba(220,38,38,.55)'
      al.innerHTML = `⚠ Llegaste <strong>${minsToStr(lateMin)} tarde</strong> a tu turno.<br>
        <span style="color:rgba(255,160,160,.9)">El administrador será informado. Escribe el motivo.</span>`

      const btn = document.getElementById('confirmReasonBtn')
      btn.textContent = 'Confirmar entrada'
      btn.className   = 'btn-main btn-entrada'
      btn.disabled    = true

      document.getElementById('reasonText').value = ''
      showState('state-reason')
    }

    async function confirmLateArrival() {
      const reason = document.getElementById('reasonText').value.trim()
      if (!reason || reason.length < 5) return
      if (!pendingLateArrival) return

      showState('state-loading')
      await sb.from('clock_records').update({
        deviation_note: reason
      }).eq('id', pendingLateArrival.recordId)

      // WA con motivo (complementa la notificación enviada al clock-in)
      if (pendingLateArrival.lateMin > 0) {
        const shift = currentSchedule?.shift_start
          ? `${currentSchedule.shift_start.slice(0,5)}–${currentSchedule.shift_end.slice(0,5)}`
          : ''
        notifyAdminWA(
          `📋 Motivo de tardanza — ${currentProfile.full_name}${shift ? ' (' + shift + ')' : ''}\n"${reason}"`
        )
      }

      pendingLateArrival = null

      try { await sb.auth.signOut() } catch (_) {}
      const timeStr = new Date(clockRecord.clock_in).toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit' })
      document.getElementById('successLabel').textContent = 'ENTRADA REGISTRADA'
      document.getElementById('successTime').textContent  = timeStr
      document.getElementById('successName').textContent  = currentProfile.full_name
      showState('state-success')
      startCountdown('countdownBar', 'countdownTxt', 5, reset)
    }

    // Router: decide si es confirmación de entrada tardía o salida
    function confirmReason() {
      if (pendingLateArrival) {
        confirmLateArrival()
      } else {
        confirmClockOut()
      }
    }

    async function confirmClockOut() {
      const reason = document.getElementById('reasonText').value.trim()
      if (!reason || reason.length < 5) return
      if (!pendingClockOut) return
      const devType = pendingClockOut.deviationData?.mainType
      await saveClockOut(pendingClockOut.now, reason, pendingClockOut.needsReview, devType)
      pendingClockOut = null
    }

    async function sendExitWA(devType, deviationData, reason) {
      if (!deviationData) return
      const { earlyDepartureMin, overtimeMin, workedMin, scheduledMin } = deviationData
      const shift = currentSchedule?.shift_start
        ? `${currentSchedule.shift_start.slice(0,5)}–${currentSchedule.shift_end.slice(0,5)}`
        : ''
      const name = currentProfile.full_name

      if (devType === 'early_exit') {
        notifyAdminWA(
          `⚠️ First Patagonia HR\n` +
          `${name} salió ${minsToStr(earlyDepartureMin)} antes de su turno${shift ? ' (' + shift + ')' : ''}.\n` +
          `Trabajó ${minsToStr(workedMin)} de ${minsToStr(scheduledMin)}.\n` +
          `Motivo: "${reason}"`
        )
      } else if (devType === 'overtime') {
        notifyAdminWA(
          `ℹ️ First Patagonia HR\n` +
          `${name} se quedó ${minsToStr(overtimeMin)} extra${shift ? ' en turno ' + shift : ''}.\n` +
          `Motivo: "${reason}"`
        )
      }
    }

    async function saveClockOut(now, note, needsReview, devType = null) {
      showState('state-loading')

      // Enviar WA al admin antes de guardar
      if (devType && pendingClockOut?.deviationData) {
        await sendExitWA(devType, pendingClockOut.deviationData, note)
      }

      const { data, error } = await sb.from('clock_records').update({
        clock_out: now.toISOString(),
        deviation_note: note,
        needs_review: needsReview
      }).eq('id', clockRecord.id).select().single()

      // ── Overtime: crear solicitud HH.EE. automática ─────────
      // Si el empleado trabajó 30+ min extra y dio un motivo,
      // se genera directamente una solicitud pendiente de aprobación.
      // El empleado no tiene que hacer nada más.
      if (!error && devType === 'overtime' && pendingClockOut?.deviationData?.overtimeMin > 0) {
        const overMin   = pendingClockOut.deviationData.overtimeMin
        const overHours = Math.max(0.5, Math.round(overMin / 30) * 0.5)  // mínimo 0.5h, redondeo a 0.5h
        await sb.from('overtime_records').insert({
          employee_id: currentProfile.id,
          date:        now.toISOString().split('T')[0],
          hours:       overHours,
          reason:      note,
          status:      'pendiente'
        }).catch(() => {})  // silencioso si falla (no bloquea la salida)
      }

      if (error) { showAction(); return }
      clockRecord = data

      // Notificar salida normal (sin desviación)
      if (!devType) {
        const outTime   = now.toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit' })
        const actualMin = (now - new Date(data.clock_in)) / 60000
        let schedMin    = null
        if (currentSchedule?.shift_start && currentSchedule?.shift_end) {
          const [sh,sm] = currentSchedule.shift_start.slice(0,5).split(':').map(Number)
          const [eh,em] = currentSchedule.shift_end.slice(0,5).split(':').map(Number)
          schedMin = (eh*60+em)-(sh*60+sm)
        }
        const workedStr = minsToStr(schedMin !== null ? Math.min(actualMin, schedMin) : actualMin)
        const shiftStr2 = currentSchedule?.shift_start
          ? `${currentSchedule.shift_start.slice(0,5)}–${currentSchedule.shift_end.slice(0,5)}`
          : ''
        notifyAdminWA(`✅ First Patagonia HR\n${currentProfile.full_name} salió a las ${outTime}\nTrabajó: ${workedStr}${shiftStr2 ? '  · Turno: ' + shiftStr2 : ''}`)
      }

      try { await sb.auth.signOut() } catch (_) {}
      const timeStr = now.toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit' })
      document.getElementById('successLabel').textContent = 'SALIDA REGISTRADA'
      document.getElementById('successTime').textContent  = timeStr
      document.getElementById('successName').textContent  = currentProfile.full_name
      showState('state-success')
      startCountdown('countdownBar', 'countdownTxt', 5, reset)
    }

    // ── Cancelar ───────────────────────────────────────────────
    async function cancelAction() {
      pendingLateArrival = null
      pendingClockOut    = null
      try { await sb.auth.signOut() } catch (_) {}  // no-op si no hay sesión activa
      reset()
    }

    // ── Jornada completa ───────────────────────────────────────
    async function showDone() {
      document.getElementById('doneName').textContent = currentProfile.full_name
      document.getElementById('doneIn').textContent  =
        new Date(clockRecord.clock_in).toLocaleTimeString('es-CL',  { hour:'2-digit', minute:'2-digit' })
      document.getElementById('doneOut').textContent =
        new Date(clockRecord.clock_out).toLocaleTimeString('es-CL', { hour:'2-digit', minute:'2-digit' })

      try { await sb.auth.signOut() } catch (_) {}
      showState('state-done')
      startCountdown('countdownBar2', 'countdownTxt2', 6, reset)
    }

    // ── Countdown ──────────────────────────────────────────────
    function startCountdown(barId, txtId, seconds, cb) {
      clearInterval(countdownTimer)
      const bar = document.getElementById(barId)
      const txt = document.getElementById(txtId)
      let remaining = seconds
      bar.style.transition = `width ${seconds}s linear`
      bar.style.width = '100%'

      txt.textContent = `Volviendo en ${remaining}...`

      setTimeout(() => { bar.style.width = '0%' }, 50)

      countdownTimer = setInterval(() => {
        remaining--
        txt.textContent = `Volviendo en ${remaining}...`
        if (remaining <= 0) { clearInterval(countdownTimer); cb() }
      }, 1000)
    }

    // ── Reset ──────────────────────────────────────────────────
    function reset() {
      stopIdleTimer()
      clearInterval(countdownTimer)
      currentProfile     = null
      clockRecord        = null
      pendingLateArrival = null
      pendingClockOut    = null
      document.querySelectorAll('.over10-warn').forEach(el => el.remove())
      pinValue = ''
      updatePinDots()
      document.getElementById('pinError')?.classList.remove('show')
      document.getElementById('inputEmail').value    = ''
      document.getElementById('inputPassword').value = ''
      document.getElementById('loginError').classList.remove('show')
      document.getElementById('loginBtn').disabled   = false
      showState('state-pin')  // siempre vuelve al PIN pad
    }

    // ── Prevenir cierre accidental (modo kiosko) ───────────────
    document.addEventListener('keydown', e => {
      if (e.key === 'F5' || (e.ctrlKey && e.key === 'r')) e.preventDefault()
    })
  </script>
</body>
</html>
