<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingresar — First Patagonia HR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <div class="dot"></div>
        <h1>First Patagonia</h1>
        <p>Panel de Control Interno</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" placeholder="nombre@firstpatagonia.cl" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn--primary btn--full" id="submitBtn">
          Ingresar
        </button>
      </form>

      <p class="text-muted text-sm mt-3" style="text-align:center">
        <button type="button" onclick="showReset()" style="background:none;border:none;color:var(--t2);font-size:.82rem;cursor:pointer;text-decoration:underline;font-family:var(--font-sans)">
          ¿Olvidaste tu contraseña?
        </button>
      </p>
    </div>

    <!-- Panel recuperar contraseña -->
    <div class="login-card" id="resetCard" style="display:none;margin-top:1rem">
      <div style="font-size:.9rem;font-weight:500;margin-bottom:1rem">Recuperar contraseña</div>
      <div class="form-group">
        <label for="resetEmail">Tu correo electrónico</label>
        <input type="email" id="resetEmail" placeholder="nombre@firstpatagonia.cl" autocomplete="email">
      </div>
      <button class="btn btn--primary btn--full" id="resetBtn" onclick="sendReset()">
        Enviar enlace de recuperación
      </button>
      <button type="button" onclick="showLogin()" style="background:none;border:none;color:var(--t2);font-size:.82rem;cursor:pointer;margin-top:.75rem;width:100%;font-family:var(--font-sans)">
        ← Volver al inicio de sesión
      </button>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/client.js"></script>
  <script>
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = 'dashboard.html'
    })

    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault()
      const btn = document.getElementById('submitBtn')
      btn.disabled = true
      btn.textContent = 'Ingresando...'

      const { error } = await sb.auth.signInWithPassword({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      })

      if (error) {
        toast('Correo o contraseña incorrectos', 'error')
        btn.disabled = false
        btn.textContent = 'Ingresar'
      } else {
        window.location.href = 'dashboard.html'
      }
    })

    function showReset() {
      document.querySelector('.login-card').style.display = 'none'
      document.getElementById('resetCard').style.display = 'block'
      document.getElementById('resetEmail').focus()
    }

    function showLogin() {
      document.getElementById('resetCard').style.display = 'none'
      document.querySelector('.login-card').style.display = 'block'
    }

    async function sendReset() {
      const email = document.getElementById('resetEmail').value.trim()
      if (!email) { toast('Ingresa tu correo', 'error'); return }

      const btn = document.getElementById('resetBtn')
      btn.disabled = true
      btn.textContent = 'Enviando...'

      const { error } = await sb.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/login.html'
      })

      btn.disabled = false
      btn.textContent = 'Enviar enlace de recuperación'

      if (error) {
        toast('Error al enviar. Verifica el correo ingresado.', 'error')
      } else {
        toast('Enlace enviado ✓ Revisa tu correo', 'success')
        setTimeout(showLogin, 2000)
      }
    }

    function toast(msg, type = '') {
      let c = document.getElementById('toast-container')
      const t = document.createElement('div')
      t.className = `toast${type ? ' toast--' + type : ''}`
      t.textContent = msg
      c.appendChild(t)
      setTimeout(() => t.remove(), 3500)
    }
  </script>
</body>
</html>
